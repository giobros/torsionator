    # TF 2.14 + scientific stack
    - tensorflow==2.14.0
    - matplotlib==3.9.4
    - scipy==1.13.1
    - pandas==2.0.3
    - h5py==3.11.0
    - tqdm==4.67.1
    - joblib==1.5.1
    - networkx==3.2.1
    - Pillow==10.4.0
    # Torsionator extras
    - ParmEd==4.0.0
